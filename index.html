<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Schedule · DIS1</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>

/* ── TOKENS ──────────────────────────────────────── */
:root {
  --bg:         #000000;
  --c1:         #0D0D0D;
  --c2:         #161616;
  --c3:         #1E1E1E;
  --b1:         rgba(255,255,255,0.055);
  --b2:         rgba(255,255,255,0.09);
  --b3:         rgba(255,255,255,0.14);
  --t1:         #FFFFFF;
  --t2:         #8A8A8A;
  --t3:         #3A3A3A;
  --gold:       #D4962A;
  --gold-glow:  rgba(212,150,42,0.14);
  --gold-ring:  rgba(212,150,42,0.22);
  --green:      #34C759;
  --green-dim:  rgba(52,199,89,0.10);
  --green-b:    rgba(52,199,89,0.18);
  --red:        #FF3B30;
  --red-dim:    rgba(255,59,48,0.10);
  --red-b:      rgba(255,59,48,0.22);
  --blur:       blur(30px) saturate(1.8);
}

[data-theme="light"] {
  --bg:         #F2F2F7;
  --c1:         #FFFFFF;
  --c2:         #F2F2F7;
  --c3:         #E5E5EA;
  --b1:         rgba(0,0,0,0.055);
  --b2:         rgba(0,0,0,0.08);
  --b3:         rgba(0,0,0,0.13);
  --t1:         #000000;
  --t2:         #6C6C70;
  --t3:         #C7C7CC;
  --gold:       #B07820;
  --gold-glow:  rgba(176,120,32,0.10);
  --gold-ring:  rgba(176,120,32,0.20);
  --green:      #248A3D;
  --green-dim:  rgba(36,138,61,0.08);
  --green-b:    rgba(36,138,61,0.16);
  --red:        #D70015;
  --red-dim:    rgba(215,0,21,0.08);
  --red-b:      rgba(215,0,21,0.20);
}

/* ── RESET ───────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
button{border:none;background:none;cursor:pointer;font:inherit;}

body {
  font-family:'Manrope',system-ui,sans-serif;
  background:var(--bg);
  color:var(--t1);
  min-height:100svh;
  overflow-x:hidden;
  overscroll-behavior-y:none;
  -webkit-overflow-scrolling:touch;
  transition:background .3s,color .3s;
}

/* ── HEADER ──────────────────────────────────────── */
.hdr {
  position:sticky;
  top:0;z-index:200;
  padding-top:env(safe-area-inset-top,0px);
  /* frosted distortion glass */
  background:rgba(0,0,0,0.62);
  backdrop-filter:url(#frost-distort) blur(26px) saturate(1.9) brightness(1.05);
  -webkit-backdrop-filter:url(#frost-distort) blur(26px) saturate(1.9) brightness(1.05);
  border-bottom:1px solid var(--b2);
  /* shimmer edge */
  box-shadow:
    0 1px 0 rgba(255,255,255,0.055) inset,
    0 6px 32px rgba(0,0,0,0.55);
  /* isolate so filter doesn't bleed */
  isolation:isolate;
}
/* glass texture overlay — rides on top of blurred backdrop */
.hdr::after {
  content:'';
  position:absolute;inset:0;
  pointer-events:none;z-index:0;
  background:
    /* top-edge light seam */
    linear-gradient(180deg,
      rgba(255,255,255,0.05) 0px,
      rgba(255,255,255,0.0) 2px);
  /* animated shimmer across the glass */
  background-size:100% 100%;
}
/* content inside header sits above the overlay */
.hdr-top, .sem { position:relative; z-index:1; }

[data-theme="light"] .hdr {
  background:rgba(235,235,240,0.74);
  backdrop-filter:url(#frost-distort) blur(26px) saturate(1.6) brightness(1.02);
  -webkit-backdrop-filter:url(#frost-distort) blur(26px) saturate(1.6) brightness(1.02);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.7) inset,
    0 4px 24px rgba(0,0,0,0.10);
}

.hdr-top {
  display:flex;align-items:center;
  justify-content:space-between;
  padding:15px 20px 0;
}

.hdr-title {
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:700;
  letter-spacing:-.3px;color:var(--t1);
  line-height:1;
}

.hdr-sub {
  margin-top:3px;
  font-size:10px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);
}

/* toggle */
.tog {
  display:flex;align-items:center;gap:5px;
  background:var(--c2);
  border:1px solid var(--b2);
  border-radius:100px;
  padding:6px 12px 6px 9px;
  font-family:'Manrope',sans-serif;
  font-size:11px;font-weight:600;
  color:var(--t2);
  transition:opacity .2s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.tog:active{opacity:.6;}
.tog svg{width:13px;height:13px;fill:none;stroke:currentColor;
  stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}

/* semester strip */
.sem {
  padding:12px 20px 14px;
}
.sem-row {
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:7px;
}
.sem-lbl {
  font-size:9px;font-weight:500;
  letter-spacing:.07em;color:var(--t3);
}
.sem-today {
  font-size:9px;font-weight:600;
  letter-spacing:.06em;color:var(--gold);
}
.sem-wrap {
  position:relative;height:14px;
}
.sem-track {
  position:absolute;top:50%;left:0;right:0;
  height:1px;background:var(--b2);transform:translateY(-50%);
}
.sem-fill {
  position:absolute;top:50%;left:0;
  height:1px;background:var(--gold);
  transform:translateY(-50%);
  width:0%;
  transition:width 1.6s cubic-bezier(.16,1,.3,1) .35s;
}
.sem-dot {
  position:absolute;top:50%;left:0%;
  transform:translate(-50%,-50%);
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 0 3px var(--gold-glow);
  z-index:3;
  transition:left 1.6s cubic-bezier(.16,1,.3,1) .35s;
}
.stk {
  position:absolute;top:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;z-index:2;
}
.stk-p{width:3px;height:3px;background:var(--t3);}
.stk-n{width:5px;height:5px;background:var(--bg);border:1.5px solid var(--gold);
  box-shadow:0 0 0 2px var(--gold-glow);}
.stk-f{width:3px;height:3px;background:var(--bg);border:1px solid var(--t3);}

/* ── BODY ────────────────────────────────────────── */
.body {
  padding:20px 16px calc(env(safe-area-inset-bottom,0px) + 44px);
  max-width:500px;margin:0 auto;
}

/* ── NEXT-UP PILL ────────────────────────────────── */
.next-pill {
  display:flex;justify-content:center;
  margin-bottom:8px;
}
.next-pill-inner {
  font-size:9px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);
  background:var(--gold-glow);
  border:1px solid var(--gold-ring);
  padding:4px 14px;border-radius:100px;
}

/* ── CARD WRAPPER ────────────────────────────────── */
.cw {
  margin-bottom:8px;
  opacity:0;transform:translateY(12px);
  transition:opacity .45s ease,transform .45s ease;
}
.cw.in{opacity:1;transform:translateY(0);}
.cw.done{opacity:.28!important;}

/* ── CARD ────────────────────────────────────────── */
.card {
  background:var(--c1);
  border:1px solid var(--b1);
  border-radius:18px;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.card.nx {
  border-color:var(--gold-ring);
  box-shadow:0 0 0 1px var(--gold-ring) inset,
             0 4px 32px var(--gold-glow);
}

/* card body */
.cb {
  display:flex;align-items:center;
  gap:10px;padding:15px 15px 11px;
}
.ci{flex:1;min-width:0;}

.cc {
  font-size:8.5px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);margin-bottom:5px;
}
.cn {
  font-family:'Syne',sans-serif;
  font-size:15px;font-weight:600;
  color:var(--t1);line-height:1.2;
  letter-spacing:-.15px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ct {
  margin-top:3px;
  font-size:12px;font-weight:300;
  font-style:italic;color:var(--t2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ring */
.ring-svg{display:block;flex-shrink:0;}
.r-track{fill:none;stroke:var(--c3);stroke-width:2.5;}
.r-arc{
  fill:none;stroke-width:2.5;stroke-linecap:round;
  stroke-dasharray:138.23;stroke-dashoffset:138.23;
  transform-box:fill-box;transform-origin:center;
  rotate:-90deg;
  transition:stroke-dashoffset 1.1s cubic-bezier(.16,1,.3,1),
             stroke .3s ease;
}

/* card footer */
.cf {
  display:flex;align-items:center;
  justify-content:space-between;
  padding:9px 15px 13px;
  border-top:1px solid var(--b1);
  gap:8px;
}

.badge {
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;letter-spacing:.03em;
  padding:4px 10px 4px 7px;border-radius:100px;
  border:1px solid transparent;flex-shrink:0;
}
.badge svg{width:10px;height:10px;fill:none;stroke:currentColor;
  stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.bc{color:var(--gold);background:var(--gold-glow);border-color:var(--gold-ring);}
.bo{color:var(--green);background:var(--green-dim);border-color:var(--green-b);}

.ds{
  font-size:11px;font-weight:500;
  color:var(--t2);white-space:nowrap;flex-shrink:0;
}

/* ── DIVIDER ─────────────────────────────────────── */
.dvd{
  display:flex;align-items:center;gap:10px;
  margin:22px 0 12px;
}
.dvd-l{flex:1;height:1px;background:var(--b1);}
.dvd-t{
  font-size:8.5px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;color:var(--t3);
}

/* ── FOOTER ──────────────────────────────────────── */
.foot{
  text-align:center;margin-top:36px;
  font-size:10px;font-weight:500;
  color:var(--t3);letter-spacing:.06em;opacity:.55;
}

/* ── BREATHING GLOW on toggle icon ───────────────── */
@keyframes breathe {
  0%   { filter: drop-shadow(0 0 0px transparent); opacity: 1; }
  45%  { filter: drop-shadow(0 0 5px var(--gold)) drop-shadow(0 0 10px var(--gold-glow)); opacity: 0.88; }
  55%  { filter: drop-shadow(0 0 7px var(--gold)) drop-shadow(0 0 16px var(--gold-glow)); opacity: 0.84; }
  100% { filter: drop-shadow(0 0 0px transparent); opacity: 1; }
}
.tog-icon { animation: breathe 7s ease-in-out infinite; will-change: filter; }

/* ── FADE IN ─────────────────────────────────────── */
@keyframes fd{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.hdr{animation:fd .4s ease both;}
.body{animation:fd .4s ease both .06s;}

</style>
</head>
<body>

<svg style="display:none">
  <symbol id="s-bld" viewBox="0 0 24 24">
    <rect x="4" y="3" width="16" height="18" rx="1.5"/>
    <line x1="4" y1="8" x2="20" y2="8"/>
    <line x1="4" y1="13" x2="20" y2="13"/>
    <line x1="9" y1="3" x2="9" y2="21"/>
    <line x1="15" y1="3" x2="15" y2="21"/>
  </symbol>
  <symbol id="s-upl" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9"/>
    <polyline points="9,11.5 12,8.5 15,11.5"/>
    <line x1="12" y1="8.5" x2="12" y2="15.5"/>
  </symbol>
  <symbol id="s-sun" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="4"/>
    <line x1="12" y1="2" x2="12" y2="5.5"/>
    <line x1="12" y1="18.5" x2="12" y2="22"/>
    <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
    <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
    <line x1="2" y1="12" x2="5.5" y2="12"/>
    <line x1="18.5" y1="12" x2="22" y2="12"/>
    <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
    <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
  </symbol>
  <symbol id="s-moon" viewBox="0 0 24 24">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </symbol>
</svg>

<!-- FROST DISTORTION FILTER — applied via backdrop-filter: url(#frost-distort) -->
<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <filter id="frost-distort" x="-10%" y="-10%" width="120%" height="120%"
            color-interpolation-filters="sRGB">
      <!-- slow-drifting turbulence noise -->
      <feTurbulence id="frt" type="fractalNoise"
        baseFrequency="0.032 0.024" numOctaves="3" seed="5" result="noise">
        <animate attributeName="baseFrequency"
          dur="18s"
          values="0.032 0.024; 0.036 0.029; 0.030 0.022; 0.032 0.024"
          calcMode="spline"
          keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
          repeatCount="indefinite"/>
        <animate attributeName="seed"
          dur="34s"
          values="5;8;3;11;5"
          calcMode="discrete"
          repeatCount="indefinite"/>
      </feTurbulence>
      <!-- displace the backdrop — scale 10 = subtle, liquid warp -->
      <feDisplacementMap in="SourceGraphic" in2="noise"
        scale="10" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">Assessments</div>
      <div class="hdr-sub">DIS1 · Year 1 · 2026</div>
    </div>
    <button class="tog" onclick="toggleTheme()" aria-label="Toggle theme">
      <span class="tog-icon"><svg id="ti" viewBox="0 0 24 24"><use href="#s-sun"/></svg></span>
      <span id="tl">Light</span>
    </button>
  </div>
  <div class="sem">
    <div class="sem-row">
      <span class="sem-lbl">1 Apr</span>
      <span class="sem-today" id="sem-today">Today</span>
      <span class="sem-lbl">29 May</span>
    </div>
    <div class="sem-wrap">
      <div class="sem-track"></div>
      <div class="sem-fill" id="sf"></div>
      <div id="stks"></div>
      <div class="sem-dot" id="sd"></div>
    </div>
  </div>
</header>

<!-- BODY -->
<main class="body">
  <div id="up"></div>
  <div id="dn"></div>
  <p class="foot">Made by Dylan Gorrah</p>
</main>

<script>
const DATA=[
  {code:'PROG5121',name:'Programming 1A',            task:'Part 1',             type:'online',date:new Date(2026,3,13)},
  {code:'IQTT5111',name:'Quantitative Thinking',     task:'Test 1 — Sitting 1', type:'campus',date:new Date(2026,3,29)},
  {code:'BUIS5111',name:'Business Info Systems',     task:'Test 1 — Sitting 1', type:'campus',date:new Date(2026,4,4)},
  {code:'PRLD5121',name:'Programming Logic & Design',task:'Test 1 — Sitting 1', type:'campus',date:new Date(2026,4,8)},
  {code:'IQTT5111',name:'Quantitative Thinking',     task:'Assignment 1',       type:'online',date:new Date(2026,4,19)},
  {code:'BUIS5111',name:'Business Info Systems',     task:'Project 1',          type:'online',date:new Date(2026,4,22)},
  {code:'PROG5121',name:'Programming 1A',            task:'Part 2',             type:'online',date:new Date(2026,4,25)},
  {code:'PRLD5121',name:'Programming Logic & Design',task:'Project 1',          type:'online',date:new Date(2026,4,29)},
];

const SEM_S=new Date(2026,3,1);
const SEM_E=new Date(2026,4,29);
const CIRC=2*Math.PI*22; // 138.23
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DA=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dl(d){return Math.round((d-today())/864e5);}
function semP(d){return Math.max(0,Math.min(1,(d-SEM_S)/(SEM_E-SEM_S)));}
function fmt(d){return `${DA[d.getDay()]} ${d.getDate()} ${MO[d.getMonth()]}`;}

/* ring arc fill — urgency-based (full=plenty of time, draining=approaching) */
function ringFrac(days,isPast){
  if(isPast)    return 1;
  if(days===0)  return 0.06;
  if(days<=3)   return 0.18;
  if(days<=7)   return 0.32;
  if(days<=14)  return 0.52;
  if(days<=30)  return 0.72;
  return 0.88;
}

function ringColor(days,isPast){
  if(isPast)   return 'var(--t3)';
  if(days<=5)  return 'var(--red)';
  if(days<=14) return 'var(--gold)';
  return 'var(--gold)';
}

function makeRing(days,isPast){
  const frac  = ringFrac(days,isPast);
  const color = ringColor(days,isPast);
  const target= CIRC*(1-frac);

  let inner='';
  if(isPast){
    inner=`<text x="26" y="26"
      font-family="Syne,sans-serif" font-size="11" font-weight="700"
      fill="var(--t3)" text-anchor="middle" dominant-baseline="central"
      font-style="italic">done</text>`;
  } else if(days===0){
    inner=`<text x="26" y="24"
      font-family="Syne,sans-serif" font-size="8" font-weight="700"
      fill="var(--red)" text-anchor="middle" dominant-baseline="central"
      letter-spacing="0.5">TODAY</text>`;
  } else {
    inner=`
      <text x="26" y="22"
        font-family="Syne,sans-serif" font-size="15" font-weight="700"
        fill="var(--t1)" text-anchor="middle" dominant-baseline="auto">${days}</text>
      <text x="26" y="33"
        font-family="Manrope,sans-serif" font-size="7" font-weight="500"
        fill="var(--t2)" text-anchor="middle" dominant-baseline="auto"
        letter-spacing="0.06em">${days===1?'DAY':'DAYS'}</text>`;
  }

  return `<svg class="ring-svg" width="54" height="54" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
    <circle cx="26" cy="26" r="22" class="r-track"/>
    <circle cx="26" cy="26" r="22" class="r-arc"
      stroke="${color}"
      data-target="${target}"
      style="stroke-dashoffset:${CIRC}"/>
    ${inner}
  </svg>`;
}

function buildStrip(){
  const p=semP(today())*100;
  document.getElementById('sem-today').textContent=fmt(today());
  setTimeout(()=>{
    document.getElementById('sf').style.width=p+'%';
    document.getElementById('sd').style.left=p+'%';
  },300);
  const nextI=DATA.findIndex(a=>dl(a.date)>=0);
  const wrap=document.getElementById('stks');
  DATA.forEach((a,i)=>{
    const days=dl(a.date);
    const el=document.createElement('div');
    el.className='stk '+(days<0?'stk-p':i===nextI?'stk-n':'stk-f');
    el.style.left=semP(a.date)*100+'%';
    wrap.appendChild(el);
  });
}

function buildCards(){
  const nextI=DATA.findIndex(a=>dl(a.date)>=0);
  const upSec=document.getElementById('up');
  const dnSec=document.getElementById('dn');
  let hasPast=false;

  DATA.forEach((a,i)=>{
    const days=dl(a.date);
    const isPast=days<0, isNext=i===nextI;

    if(isPast&&!hasPast){
      hasPast=true;
      dnSec.innerHTML=`<div class="dvd">
        <div class="dvd-l"></div>
        <span class="dvd-t">Submitted</span>
        <div class="dvd-l"></div>
      </div>`;
    }

    const ring=makeRing(days,isPast);
    const wrap=document.createElement('div');
    wrap.className='cw'+(isPast?' done':'');

    wrap.innerHTML=`
      ${isNext?'<div class="next-pill"><div class="next-pill-inner">Next Up</div></div>':''}
      <div class="card${isNext?' nx':''}">
        <div class="cb">
          <div class="ci">
            <div class="cc">${a.code}</div>
            <div class="cn">${a.name}</div>
            <div class="ct">${a.task}</div>
          </div>
          ${ring}
        </div>
        <div class="cf">
          <span class="badge ${a.type==='campus'?'bc':'bo'}">
            <svg viewBox="0 0 24 24"><use href="#${a.type==='campus'?'s-bld':'s-upl'}"/></svg>
            ${a.type==='campus'?'Campus Sitting':'Online Submission'}
          </span>
          <span class="ds">${fmt(a.date)}</span>
        </div>
      </div>`;

    (isPast?dnSec:upSec).appendChild(wrap);

    /* staggered reveal */
    setTimeout(()=>{
      wrap.classList.add('in');
      /* animate ring */
      setTimeout(()=>{
        wrap.querySelectorAll('.r-arc').forEach(el=>{
          el.style.transition=
            'stroke-dashoffset 1.1s cubic-bezier(.16,1,.3,1),stroke .3s ease';
          el.style.strokeDashoffset=el.dataset.target;
        });
      },60);
    },80+i*55);
  });
}

function setThemeUI(){
  const dark=document.documentElement.dataset.theme==='dark';
  document.getElementById('ti').innerHTML=`<use href="#${dark?'s-sun':'s-moon'}"/>`;
  document.getElementById('tl').textContent=dark?'Light':'Dark';
}
function toggleTheme(){
  const h=document.documentElement;
  h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';
  localStorage.setItem('_t',h.dataset.theme);
  setThemeUI();
}

(function(){
  const s=localStorage.getItem('_t');
  if(s)document.documentElement.dataset.theme=s;
  setThemeUI();buildStrip();buildCards();
})();
</script>
